services:
  frontend:
    build: ./frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:5000
    depends_on:
      - backend

  backend:
    build: ./backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env