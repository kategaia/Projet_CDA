name: VoxelBingo CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1 : Tests Backend ──────────────────────────────────────
  test-backend:
    name: Tests Backend (pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installation des dépendances
        working-directory: ./backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Lancement des tests
        working-directory: ./backend
        env:
          SECRET_KEY: "test_secret_key_ci"
          DATABASE_URL: "sqlite:///:memory:"
        run: |
          pytest tests/ -v --cov=. --cov-report=term-missing

  # ── Job 2 : Tests Frontend ─────────────────────────────────────
  test-frontend:
    name: Tests Frontend (vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Installation des dépendances
        working-directory: ./frontend
        run: npm install

      - name: Lancement des tests
        working-directory: ./frontend
        run: npm run test

  # ── Job 3 : Build Docker ───────────────────────────────────────
  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]  # Lance seulement si les tests passent

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Build image backend
        run: docker build -t voxelbingo-backend ./backend

      - name: Build image frontend
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.API_URL }} \
            -t voxelbingo-frontend ./frontend

  # ── Job 4 : Déploiement sur le Pi ─────────────────────────────
  deploy:
    name: Déploiement Raspberry Pi
    runs-on: ubuntu-latest
    needs: [build]  # Lance seulement si le build réussit
    if: github.ref == 'refs/heads/main'  # Seulement sur la branche main

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Déploiement via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PI_HOST }}        # IP Tailscale du Pi
          username: ${{ secrets.PI_USER }}    # kategaia
          key: ${{ secrets.PI_SSH_KEY }}      # Clé SSH privée
          script: |
            cd ~/Projet_CDA
            git pull origin main
            docker compose up --build -d
            echo "Déploiement terminé !"